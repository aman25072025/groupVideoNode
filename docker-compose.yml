version: '3.8'

services:
  video-call-server:
    build: .
    ports:
      - "8000:8000"
      - "40000-49999:40000-49999/udp"
    environment:
      - NODE_ENV=production
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - video-call-network

networks:
  video-call-network:
    driver: bridge
